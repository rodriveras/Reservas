<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeoGestión Cabañas | Master</title>
    
    <!-- CSS Externo -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    
    <!-- Nuestro CSS Modular -->
    <link rel="stylesheet" href="css/base.css">
</head>
<body>

    <!-- Nivel 3: UI Principal -->
    <header class="main-header">
        <div class="brand">
            <span class="tag">PRO</span>
            <h1>GeoGestión <span>Cabañas</span></h1>
        </div>
        <div class="controls">
            <input type="date" id="master-date-filter" class="date-input">
            <div id="sync-status" class="status-pill"><i class="fas fa-sync fa-spin"></i> Sincronizando...</div>
        </div>
    </header>

    <!-- El Mapa -->
    <div id="map"></div>

    <!-- Nivel 5: Business Intelligence Dashboard -->
    <section class="bi-dashboard">
        <div class="kpi-card" data-type="ocupacion">
            <span class="value" id="kpi-occ">0%</span>
            <span class="label">Ocupación</span>
        </div>
        <div class="kpi-card" data-type="revpar">
            <span class="value" id="kpi-rev">$ 0</span>
            <span class="label">RevPAR</span>
        </div>
        <div class="kpi-card" data-type="alertas">
            <span class="value" id="kpi-alert">0</span>
            <span class="label">Mantención</span>
        </div>
    </section>

    <!-- Detalle de Cabaña (BottomSheet) -->
    <div id="bs-overlay" class="overlay"></div>
    <div id="cabin-sheet" class="bottom-sheet">
        <div class="handle"></div>
        <div class="sheet-content" id="sheet-data">
            <!-- Cargado dinámicamente -->
            <div class="loading-cabin">
                <i class="fas fa-circle-notch fa-spin"></i> Cargando datos...
            </div>
        </div>
    </div>

    <!-- JS Modular -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Datos Espaciales estáticos desde QGIS -->
    <script src="qgis2web_2026_04_29-12_59_38_396271/data/Cabaas_3.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
