<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GeoGestión Cabañas | Master</title>
    
    <!-- CSS Externo -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    
    <!-- Nuestro CSS Modular -->
    <link rel="stylesheet" href="css/base.css">
</head>
<body>

    <!-- Nivel 3: UI Principal -->
    <header class="main-header">
        <div class="brand">
            <span class="tag">PRO</span>
            <h1>GeoGestión <span>Cabañas</span></h1>
        </div>
        <div class="controls" style="display: flex; gap: 10px; align-items: center;">
            <input type="date" id="master-date-filter" class="date-input">
            <button id="btn-toggle-view" class="btn-primary" style="padding: 8px 12px; margin: 0; width: auto;" onclick="APP.toggleView()">
                <i class="fas fa-calendar-alt"></i> Panorama
            </button>
            <button class="btn-primary" style="padding: 8px 12px; margin: 0; width: auto; background: var(--success);" onclick="APP.copyClientLink()">
                <i class="fas fa-link"></i> Link a Clientes
            </button>
            <div id="sync-status" class="status-pill"><i class="fas fa-sync fa-spin"></i> Sincronizando...</div>
        </div>
    </header>

    <!-- El Mapa -->
    <div id="map"></div>

    <!-- Vista de Calendario Panorámico -->
    <div id="calendar-view" style="display: none; position: absolute; top: 70px; bottom: 0; left: 0; right: 0; background: var(--bg-dark); z-index: 500; overflow: auto; padding: 20px;">
        <div id="calendar-content">
            <div style="color: var(--text-dim); text-align: center; margin-top: 50px;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 24px;"></i><br><br>Cargando panorama del mes...
            </div>
        </div>
    </div>

    <!-- Nivel 5: Business Intelligence Dashboard Operativo -->
    <section class="bi-dashboard">
        <div class="kpi-card" data-type="libres">
            <span class="value" id="kpi-libres" style="color: var(--success);">0</span>
            <span class="label">Libres</span>
        </div>
        <div class="kpi-card" data-type="ocupadas">
            <span class="value" id="kpi-ocupadas" style="color: var(--error);">0</span>
            <span class="label">Ocupadas</span>
        </div>
        <div class="kpi-card" data-type="ingresos">
            <span class="value" id="kpi-ingresos" style="color: var(--primary);">$ 0</span>
            <span class="label">Ingresos Hoy</span>
        </div>
    </section>

    <!-- Detalle de Cabaña (BottomSheet) -->
    <div id="bs-overlay" class="overlay"></div>
    <div id="cabin-sheet" class="bottom-sheet">
        <div class="handle"></div>
        <div class="sheet-content" id="sheet-data">
            <!-- Cargado dinámicamente -->
        </div>
    </div>

    <!-- Modal Nueva Reserva -->
    <div id="reserva-modal" class="bottom-sheet" style="z-index: 3000; max-height: 90vh; overflow-y: auto;">
        <div class="handle"></div>
        <div style="padding: 10px 0;">
            <div style="display: flex; align-items: center; margin-bottom: 20px; gap: 15px;">
                <button onclick="document.getElementById('reserva-modal').classList.remove('active'); document.getElementById('bs-overlay').classList.remove('active');" style="background:transparent; border:none; color:var(--text-main); font-size: 20px; cursor: pointer; padding: 0;">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2 style="font-family: 'Outfit'; margin: 0;">Nueva Reserva</h2>
            </div>
            
            <div class="outline-card">
                <label style="color: white; font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom:15px; display:block;"><i class="fas fa-bed"></i> Estancia en <span id="new-res-cabana" style="color:#d97736;"></span></label>
                
                <div class="form-grid" style="margin-bottom: 15px;">
                    <div>
                        <label style="color: #999; font-size: 11px; font-weight: 700; text-transform: uppercase;">Entrada</label>
                        <input type="date" id="new-res-in" class="outline-input" style="margin-top: 5px;">
                    </div>
                    <div>
                        <label style="color: #999; font-size: 11px; font-weight: 700; text-transform: uppercase;">Salida</label>
                        <input type="date" id="new-res-out" class="outline-input" style="margin-top: 5px;">
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label style="color: #999; font-size: 11px; font-weight: 700; text-transform: uppercase;">Pasajeros</label>
                        <input type="number" id="new-res-pax" class="outline-input" style="margin-top: 5px; font-size:18px;" min="1" value="2">
                    </div>
                    <div>
                        <label style="color: #999; font-size: 11px; font-weight: 700; text-transform: uppercase;">Precio a Cobrar ($)</label>
                        <input type="number" id="new-res-precio" class="outline-input" style="margin-top: 5px; font-size:18px;" min="0" placeholder="Ej: 50000">
                    </div>
                </div>
            </div>

            <!-- Acordeón Oscuro Estilo Airbnb -->
            <div class="dark-accordion-container">
                <div style="color: #888; font-size: 13px; font-weight: 700; margin-bottom: 15px; padding-left: 5px;">Configuración personalizada</div>
                
                <!-- Botón 1: Tina y Mascota -->
                <button class="dark-accordion-btn" onclick="CALENDAR.toggleAccordion(this)">
                    Extras y Tina Caliente <i class="fas fa-plus"></i>
                </button>
                <div class="dark-accordion-content">
                    <label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer; margin-bottom: 15px;">
                        <input type="checkbox" id="new-res-mascota" style="accent-color: var(--primary); width:18px; height:18px;"> <i class="fas fa-paw" style="color:#aaa; width:20px;"></i> Trae Mascota
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer; margin-bottom: 10px;">
                        <input type="checkbox" id="new-res-tina" style="accent-color: var(--primary); width:18px; height:18px;" onchange="document.getElementById('tina-price-container').style.display = this.checked ? 'block' : 'none'"> <i class="fas fa-hot-tub" style="color:#aaa; width:20px;"></i> Tina Caliente
                    </label>
                    <div id="tina-price-container" style="display:none; padding-left: 26px;">
                        <input type="number" id="new-res-tina-precio" class="dark-input" placeholder="Valor a cobrar por la tina ($)">
                    </div>
                </div>

                <!-- Botón 2: Pagos y Abonos -->
                <button class="dark-accordion-btn" onclick="CALENDAR.toggleAccordion(this)">
                    Pagos y Abonos <i class="fas fa-plus"></i>
                </button>
                <div class="dark-accordion-content">
                    <label style="font-size: 13px; color: #aaa;">Abono pagado por adelantado ($)</label>
                    <input type="number" id="new-res-abono" class="dark-input" placeholder="Ej: 25000">
                </div>

                <!-- Botón 3: Comentarios -->
                <button class="dark-accordion-btn" style="margin-bottom:0;" onclick="CALENDAR.toggleAccordion(this)">
                    Comentarios de Reserva <i class="fas fa-plus"></i>
                </button>
                <div class="dark-accordion-content" style="margin-bottom:0;">
                    <textarea id="new-res-comentarios" class="dark-input" style="min-height: 80px; resize: none;" placeholder="Detalles adicionales, cuna, hora de llegada, etc..."></textarea>
                </div>
            </div>

            <div class="outline-card">
                <label style="color: white; font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom:15px; display:block;"><i class="fas fa-user"></i> Datos del Huésped</label>
                
                <input type="text" id="new-res-cliente" class="outline-input" style="margin-bottom: 20px; font-size:18px; border-bottom:1px solid #444; padding-bottom:10px; border-radius:0;" placeholder="Nombre completo">
                
                <div class="form-grid" style="margin-bottom: 12px;">
                    <div style="position:relative;">
                        <i class="fas fa-phone" style="position:absolute; top:2px; left:0; color:#999; font-size:14px;"></i>
                        <input type="tel" id="new-res-cel" class="outline-input" style="padding-left:25px;" placeholder="+56 9...">
                    </div>
                    <div style="position:relative;">
                        <i class="fab fa-instagram" style="position:absolute; top:2px; left:0; color:#999; font-size:16px;"></i>
                        <input type="text" id="new-res-rrss" class="outline-input" style="padding-left:25px;" placeholder="@usuario">
                    </div>
                </div>

                <div style="position:relative;">
                    <i class="fas fa-envelope" style="position:absolute; top:2px; left:0; color:#999; font-size:14px;"></i>
                    <input type="email" id="new-res-email" class="outline-input" style="padding-left:25px;" placeholder="correo@ejemplo.com">
                </div>
            </div>

            <button id="btn-save-res" class="btn-primary" onclick="CALENDAR.saveReservation()">
                Listo
            </button>
        </div>
    </div>

    <!-- JS Modular -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Datos Espaciales estáticos desde QGIS -->
    <script src="qgis2web_2026_04_29-12_59_38_396271/data/Cabaas_3.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
