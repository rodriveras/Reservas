<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reservas | Refugio de Montaña</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
</head>
<body class="client-mode">

    <!-- Header simplificado para clientes -->
    <header class="main-header client-header">
        <div class="brand">
            <h1>Refugio <span>Montaña</span></h1>
        </div>
        <div class="controls" style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
            <div style="display: flex; gap: 10px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px;">
                <div style="display: flex; flex-direction: column;">
                    <label style="font-size: 9px; color: var(--text-dim); margin-left: 5px; font-weight: 700;">LLEGADA</label>
                    <input type="date" id="client-checkin" class="date-input" style="border: none; background: transparent; padding: 4px 8px;">
                </div>
                <div style="display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 10px;">
                    <label style="font-size: 9px; color: var(--text-dim); margin-left: 5px; font-weight: 700;">SALIDA</label>
                    <input type="date" id="client-checkout" class="date-input" style="border: none; background: transparent; padding: 4px 8px;">
                </div>
            </div>
            <div id="sync-status" class="status-pill" style="margin-top: 0;"><i class="fas fa-sync fa-spin"></i> Buscando...</div>
        </div>
    </header>

    <!-- El Mapa -->
    <div id="map"></div>

    <!-- Instrucción Flotante inferior (reemplaza al BI dashboard) -->
    <section class="client-instructions">
        <div class="instruction-card">
            <i class="fas fa-leaf" style="color: var(--primary); font-size: 24px; margin-bottom: 10px;"></i>
            <p style="font-size: 13px; font-weight: 600;">Selecciona tus fechas arriba para ver la disponibilidad en nuestro entorno natural. Toca una cabaña en <span style="color:var(--success)">Verde</span> para más información.</p>
        </div>
    </section>

    <!-- BottomSheet de Reserva -->
    <div id="bs-overlay" class="overlay"></div>
    <div id="cabin-sheet" class="bottom-sheet">
        <div class="handle"></div>
        <div class="sheet-content" id="sheet-data">
            <div class="loading-cabin">
                <i class="fas fa-circle-notch fa-spin"></i> Cargando...
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="qgis2web_2026_04_29-12_59_38_396271/data/Cabaas_3.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map_clientes.js"></script>
    <script src="js/ui_clientes.js"></script>
    <script src="js/app_clientes.js"></script>
</body>
</html>
